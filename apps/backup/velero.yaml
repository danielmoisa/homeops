apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 7.3.0
    helm:
      valuesObject:
        # Use Minio as S3-compatible backend
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero
              default: true
              config:
                region: us-east-1
                s3ForcePathStyle: "true"
                s3Url: http://minio.minio.svc.cluster.local:9000
                publicUrl: http://minio.minio.svc.cluster.local:9000
          volumeSnapshotLocation:
            - name: default
              provider: aws
              config:
                region: us-east-1

        # Minio credentials
        credentials:
          useSecret: true
          secretContents:
            cloud: |
              [default]
              aws_access_key_id=minioadmin
              aws_secret_access_key=minioadmin

        # Enable restic for PVC backups
        deployNodeAgent: true
        nodeAgent:
          podVolumePath: /var/lib/kubelet/pods
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 256Mi

        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.10.0
            volumeMounts:
              - mountPath: /target
                name: plugins

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
