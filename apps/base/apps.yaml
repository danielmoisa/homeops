# apps/base/minio.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.min.io
    chart: minio
    targetRevision: "5.4.0"
    helm:
      valuesObject:
        mode: standalone
        rootUser: "minioadmin"
        rootPassword: "minioadmin"
        replicas: 1
        persistence:
          enabled: true
          storageClass: "local-path"
          size: 10Gi
        resources:
          requests:
            memory: 256Mi
            cpu: 50m
          limits:
            memory: 512Mi
        buckets:
          - name: velero
            policy: none
          - name: loki
            policy: none
        consoleService:
          type: ClusterIP
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# apps/base/prometheus.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "82.10.1"
      helm:
        valueFiles:
          - $values/infrastructure/prometheus/values.yaml
    - repoURL: https://github.com/danielmoisa/homeops
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # needed for large CRDs in kube-prometheus-stack
---
