# apps/base/minio.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.min.io
    chart: minio
    targetRevision: "5.4.0"
    helm:
      valuesObject:
        mode: standalone
        rootUser: "minioadmin"
        rootPassword: "minioadmin"
        replicas: 1
        persistence:
          enabled: true
          storageClass: "local-path"
          size: 10Gi
        resources:
          requests:
            memory: 256Mi
            cpu: 50m
          limits:
            memory: 512Mi
        buckets:
          - name: velero
            policy: none
          - name: loki
            policy: none
        consoleService:
          type: ClusterIP
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# apps/base/prometheus.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "82.10.1"
      helm:
        valueFiles:
          - $values/infrastructure/prometheus/values.yaml
    - repoURL: https://github.com/danielmoisa/homeops
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # needed for large CRDs in kube-prometheus-stack
---
# apps/base/loki.yaml
source:
  repoURL: https://grafana.github.io/helm-charts
  chart: loki
  targetRevision: "6.53.0"
  helm:
    valuesObject:
      deploymentMode: SingleBinary
      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        storage:
          type: s3
          s3:
            endpoint: http://minio.minio.svc.cluster.local:9000
            bucketnames: loki
            region: us-east-1
            access_key_id: minioadmin
            secret_access_key: minioadmin
            s3ForcePathStyle: true
            insecure: true
        schemaConfig:
          configs:
            - from: "2024-01-01"
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
      singleBinary:
        replicas: 1
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 512Mi
        persistence:
          enabled: true
          storageClass: local-path
          size: 5Gi
      read:
        replicas: 0
      write:
        replicas: 0
      backend:
        replicas: 0
---
# apps/base/keycloak.yaml
source:
  repoURL: https://charts.bitnami.com/bitnami
  chart: keycloak
  targetRevision: "24.4.11"
  helm:
    valuesObject:
      auth:
        adminUser: admin
        adminPassword: "admin"
      postgresql:
        enabled: false
      production: false
      proxy: edge
      resources:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 1Gi
      service:
        type: ClusterIP
