# argocd/values.yaml
# Minimal ArgoCD config for local single-node cluster

global:
  domain: argocd.local

configs:
  params:
    # Disable TLS on argocd-server (we terminate at ingress or use port-forward)
    server.insecure: true
  cm:
    # Allow helm values files in subfolders
    helm.valuesFileSchemes: secrets+gpg-import, secrets+gpg-import-kubernetes, secrets+age-import, secrets+age-import-kubernetes, secrets,secrets+literal, https

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

applicationSet:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

notifications:
  enabled: false   # disable to save resources on local

redis:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

dex:
  enabled: false   # enable later if you want SSO via Keycloak
