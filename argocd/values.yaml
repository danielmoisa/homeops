    requests:
      cpu: 10m
      memory: 64Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

notifications:
  enabled: false

redis:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

dex:
  enabled: false
