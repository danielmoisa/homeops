# infrastructure/loki/values.yaml
# Single binary (monolithic) mode — simplest setup for local testing

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    s3:
      endpoint: http://minio.minio.svc.cluster.local:9000
      bucketnames: loki
      region: us-east-1         # Minio ignores this but it must be set
      access_key_id: minioadmin
      secret_access_key: minioadmin
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi

# Disable distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Promtail — collects logs from all pods and ships to Loki
# Deploy separately via: helm install promtail grafana/promtail -n monitoring
# Or add a promtail app entry in apps/base/
