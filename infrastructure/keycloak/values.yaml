# infrastructure/keycloak/values.yaml
# Minimal Keycloak for local SSO testing

auth:
  adminUser: admin
  adminPassword: "admin"   # change if needed

# Use embedded H2 DB for local testing (no external Postgres needed)
# Switch to postgresql section below for persistence across restarts
postgresql:
  enabled: false

externalDatabase:
  host: ""
  database: ""

keycloakConfigCli:
  enabled: false

production: false
proxy: edge

resources:
  requests:
    memory: 512Mi
    cpu: 100m
  limits:
    memory: 1Gi

service:
  type: ClusterIP

# To access:
# kubectl port-forward svc/keycloak -n keycloak 8080:80
# http://localhost:8080 — user: admin / pass: admin

